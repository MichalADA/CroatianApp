services:

  backend:
    build:
      context: ./backend
      provenance: false
      sbom: false
    container_name: chorwacki-api
    environment:
      - DB_PATH=/data/chorwacki.db
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-dev-secret-change-me-please-1234567890abcdef}
    volumes:
      - db-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      provenance: false
      sbom: false
    container_name: chorwacki-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
    driver: local
