<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chorwacki od podstaw</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<style>
.hero { padding: 3.5rem 0 2rem; text-align: center; }
.hero-sub { color: var(--text2); font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem; }
.hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.4rem, 6vw, 3.8rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; }
.hero h1 em { color: var(--accent); font-style: normal; }
.hero-desc { color: var(--text2); margin-top: 0.75rem; font-size: 15px; max-width: 480px; margin-left: auto; margin-right: auto; }

.dashboard-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin: 2rem 0;
}
.dash-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  text-align: center;
}
.dash-stat .num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; }
.dash-stat .lbl { font-size: 12px; color: var(--text3); margin-top: 4px; }

.rooms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-top: 2.5rem;
}
.room-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  display: block;
  position: relative;
  overflow: hidden;
}
.room-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--room-color, var(--accent));
  opacity: 0;
  transition: opacity 0.2s;
}
.room-card:hover { transform: translateY(-3px); border-color: var(--border2); }
.room-card:hover::before { opacity: 1; }
.room-emoji { font-size: 2.5rem; margin-bottom: 12px; display: block; }
.room-name { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.room-desc { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 16px; }
.room-meta { display: flex; gap: 12px; flex-wrap: wrap; }
.room-badge {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 100px;
  border: 1px solid var(--border2);
  color: var(--text2);
}
.room-badge.accent { border-color: var(--accent); color: var(--accent); }
.room-progress {
  margin-top: 16px;
  background: var(--surface2);
  height: 4px;
  border-radius: 2px;
  overflow: hidden;
}
.room-progress-bar {
  height: 100%;
  background: var(--room-color, var(--accent));
  border-radius: 2px;
  transition: width 0.5s ease;
}

.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
  margin-top: 2.5rem;
}

.recent-sentences { display: flex; flex-direction: column; gap: 8px; }
.sentence-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.sentence-hr { font-weight: 500; font-size: 14px; color: var(--text); }
.sentence-pl { font-size: 13px; color: var(--text2); margin-top: 2px; }
.sentence-room { font-size: 11px; color: var(--accent); border: 1px solid var(--accent); padding: 2px 8px; border-radius: 100px; white-space: nowrap; }

.empty-state { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-sub">🇭🇷 pałac pamięci</div>
    <h1>Chorwacki<br><em>od podstaw</em></h1>
    <p class="hero-desc">Ucz się chorwackiego pokój po pokoju — metodą skojarzeń i powtórek.</p>
  </div>

  <div class="dashboard-strip" id="dash-strip">
    <div class="dash-stat"><div class="num" id="d-words">—</div><div class="lbl">słów w bazie</div></div>
    <div class="dash-stat"><div class="num" id="d-verbs">—</div><div class="lbl">czasowników</div></div>
    <div class="dash-stat"><div class="num accent" id="d-known">—</div><div class="lbl">znam</div></div>
    <div class="dash-stat"><div class="num" id="d-due" style="color:var(--red)">—</div><div class="lbl">do powtórki dziś</div></div>
  </div>

  <div class="section-title">Pokoje pałacu pamięci</div>
  <div class="rooms-grid" id="rooms-grid">
    <div class="empty-state">Ładowanie pokoi…</div>
  </div>

  <div id="recent-wrap" style="display:none">
    <div class="section-title">Ostatnio dodane zdania</div>
    <div class="recent-sentences" id="recent-sentences"></div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
const roomNames = {1:'Pokój 1', 2:'Pokój 2', 3:'Pokój 3', 4:'Pokój 4'};

async function init() {
  const [rooms, dash] = await Promise.all([api.getRooms(), api.getDashboard()]);

  document.getElementById('d-words').textContent = dash.total_words;
  document.getElementById('d-verbs').textContent = dash.total_verbs;
  document.getElementById('d-known').textContent = dash.known;
  document.getElementById('d-due').textContent = dash.due_today;

  const grid = document.getElementById('rooms-grid');
  grid.innerHTML = rooms.map(r => {
    const total = r.word_count + r.verb_count;
    const pct = total ? Math.round(r.known_count / total * 100) : 0;
    return `<a href="/static/pages/room.html?id=${r.id}" class="room-card" style="--room-color:${r.color}">
      <span class="room-emoji">${r.emoji}</span>
      <div class="room-name">${r.name}</div>
      <div class="room-desc">${r.description}</div>
      <div class="room-meta">
        <span class="room-badge">${r.word_count} słów</span>
        <span class="room-badge">${r.verb_count} cz.</span>
        ${r.due_today > 0 ? `<span class="room-badge accent">⏰ ${r.due_today} do powtórki</span>` : ''}
        ${r.known_count > 0 ? `<span class="room-badge" style="border-color:${r.color};color:${r.color}">✓ ${r.known_count} znam</span>` : ''}
      </div>
      <div class="room-progress"><div class="room-progress-bar" style="width:${pct}%"></div></div>
    </a>`;
  }).join('');

  if (dash.recent_sentences && dash.recent_sentences.length) {
    document.getElementById('recent-wrap').style.display = '';
    const roomMap = Object.fromEntries(rooms.map(r => [r.id, r.name]));
    document.getElementById('recent-sentences').innerHTML = dash.recent_sentences.map(s =>
      `<div class="sentence-item">
        <div><div class="sentence-hr">${s.text_hr}</div><div class="sentence-pl">${s.text_pl || ''}</div></div>
        <span class="sentence-room">${roomMap[s.room_id] || 'Pokój ' + s.room_id}</span>
      </div>`
    ).join('');
  }
}

init();
</script>
</body>
</html>
