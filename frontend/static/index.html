<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chorwacki od podstaw</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<style>
.hero { padding: 3.5rem 0 2rem; text-align: center; }
.hero-sub { color: var(--text2); font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem; }
.hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.4rem, 6vw, 3.8rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; }
.hero h1 em { color: var(--accent); font-style: normal; }
.hero-desc { color: var(--text2); margin-top: 0.75rem; font-size: 15px; max-width: 480px; margin-left: auto; margin-right: auto; }

.dashboard-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin: 2rem 0;
}
.dash-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  text-align: center;
}
.dash-stat .num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; }
.dash-stat .lbl { font-size: 12px; color: var(--text3); margin-top: 4px; }

.rooms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-top: 2.5rem;
}
.room-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  display: block;
  position: relative;
  overflow: hidden;
}
.room-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--room-color, var(--accent));
  opacity: 0;
  transition: opacity 0.2s;
}
.room-card:hover { transform: translateY(-3px); border-color: var(--border2); }
.room-card:hover::before { opacity: 1; }
.room-emoji { font-size: 2.5rem; margin-bottom: 12px; display: block; }
.room-name { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.room-desc { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 16px; }
.room-meta { display: flex; gap: 12px; flex-wrap: wrap; }
.room-badge {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 100px;
  border: 1px solid var(--border2);
  color: var(--text2);
}
.room-badge.accent { border-color: var(--accent); color: var(--accent); }
.room-progress {
  margin-top: 16px;
  background: var(--surface2);
  height: 4px;
  border-radius: 2px;
  overflow: hidden;
}
.room-progress-bar {
  height: 100%;
  background: var(--room-color, var(--accent));
  border-radius: 2px;
  transition: width 0.5s ease;
}

.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
  margin-top: 2.5rem;
}

.recent-sentences { display: flex; flex-direction: column; gap: 8px; }
.sentence-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.sentence-hr { font-weight: 500; font-size: 14px; color: var(--text); }
.sentence-pl { font-size: 13px; color: var(--text2); margin-top: 2px; }
.sentence-room { font-size: 11px; color: var(--accent); border: 1px solid var(--accent); padding: 2px 8px; border-radius: 100px; white-space: nowrap; }

.empty-state { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }

.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:1.25rem 0 .25rem;
}
.user-chip {
  display:inline-flex; align-items:center; gap:10px;
  padding:6px 14px 6px 6px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:100px; font-size:13px; color:var(--text2);
}
.user-avatar {
  width:30px; height:30px; border-radius:50%;
  background:var(--accent); color:#0f0e0d;
  display:inline-flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-weight:800; font-size:13px;
  text-transform:uppercase;
}
.user-name { font-weight:500; color:var(--text); }

/* ─── Language switcher ─── */
.lang-switcher {
  display:inline-flex; align-items:center; gap:4px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:100px; padding:4px;
}
.lang-btn {
  display:inline-flex; align-items:center; gap:4px;
  background:none; border:none; color:var(--text2);
  font-family:'Syne',sans-serif; font-weight:700; font-size:12px;
  letter-spacing:.05em; padding:5px 10px; border-radius:100px;
  cursor:pointer; transition:all .15s;
}
.lang-btn:hover { color:var(--text); }
.lang-btn.active { background:var(--surface2); color:var(--accent); }
.lang-btn .flag { font-size:14px; }
.lang-btn[data-empty="true"] { opacity:.55; }
.topbar-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar" id="topbar" style="display:none">
    <div class="user-chip">
      <span class="user-avatar" id="user-avatar">?</span>
      <span class="user-name" id="user-name">…</span>
    </div>
    <div class="topbar-right">
      <div class="lang-switcher" id="lang-switcher"></div>
      <button class="settings-cog" id="settings-cog" title="Ustawienia">⚙</button>
      <button class="btn" onclick="auth.logout()">Wyloguj</button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-sub" id="hero-sub">🇭🇷 pałac pamięci</div>
    <h1 id="hero-h1">Chorwacki<br><em>od podstaw</em></h1>
    <p class="hero-desc" id="hero-desc">Ucz się pokój po pokoju — metodą skojarzeń i powtórek.</p>
  </div>

  <div class="dashboard-strip" id="dash-strip">
    <div class="dash-stat"><div class="num" id="d-words">—</div><div class="lbl">słów w bazie</div></div>
    <div class="dash-stat"><div class="num" id="d-verbs">—</div><div class="lbl">czasowników</div></div>
    <div class="dash-stat"><div class="num accent" id="d-known">—</div><div class="lbl">znam</div></div>
    <div class="dash-stat"><div class="num" id="d-due" style="color:var(--red)">—</div><div class="lbl">do powtórki dziś</div></div>
  </div>

  <div class="section-title">Pokoje pałacu pamięci</div>
  <div class="rooms-grid" id="rooms-grid">
    <div class="empty-state">Ładowanie pokoi…</div>
  </div>

  <div id="recent-wrap" style="display:none">
    <div class="section-title">Ostatnio dodane zdania</div>
    <div class="recent-sentences" id="recent-sentences"></div>
  </div>
</div>

<script src="/static/js/ui.js"></script>
<script src="/static/js/api.js"></script>
<script>
const roomNames = {1:'Pokój 1', 2:'Pokój 2', 3:'Pokój 3', 4:'Pokój 4'};

const roomImages = {
  1: "/static/img/rooms/korytarz.jpg",
  2: "/static/img/rooms/kuchnia.jpg",
  3: "/static/img/rooms/salon.jpg",
  4: "/static/img/rooms/sypialnia.jpg",
  5: "/static/img/rooms/biblioteka.jpg",
  6: "/static/img/rooms/miasto.jpg",
};


function applyLanguageTitle(lang) {
  // lang = obiekt z {code, name, title, flag}
  document.getElementById('hero-sub').textContent = `${lang.flag} pałac pamięci`;
  // Tytuł rozbity na 2 linie: "<Język>" + "od podstaw"
  const parts = (lang.title || lang.name || '').split(' od podstaw');
  const head = parts[0] || lang.name;
  document.getElementById('hero-h1').innerHTML = `${head}<br><em>od podstaw</em>`;
  document.title = lang.title || lang.name;
}

function renderLangSwitcher(langs, currentCode) {
  const el = document.getElementById('lang-switcher');
  el.innerHTML = langs.map(l => `
    <button class="lang-btn ${l.code === currentCode ? 'active' : ''}"
            data-empty="${!l.has_content}"
            title="${l.has_content ? l.title : l.title + ' (jeszcze pusty)'}"
            onclick="changeLanguage('${l.code}')">
      <span class="flag">${l.flag}</span>
      <span>${l.code.toUpperCase()}</span>
    </button>
  `).join('');
}

async function changeLanguage(code) {
  try {
    await api.setMyLanguage(code);
    location.reload();
  } catch (e) {
    toast(e.message || 'Nie udało się zmienić języka');
  }
}

function renderEmptyLanguageState(lang) {
  document.getElementById('rooms-grid').innerHTML = `
    <div class="empty-state" style="grid-column:1/-1;padding:3.5rem 2rem;background:var(--surface);border:1px dashed var(--border2);border-radius:16px">
      <div style="font-size:3rem;margin-bottom:1rem">${lang.flag}</div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.15rem;color:var(--text);margin-bottom:.5rem">
        ${lang.title}
      </div>
      <p style="color:var(--text2);font-size:14px;max-width:420px;margin:0 auto">
        Ten język nie ma jeszcze dodanych pokojów.<br>
        Wróć tu, gdy content zostanie wypełniony — albo przełącz się na inny język w prawym górnym rogu.
      </p>
    </div>
  `;
}

async function init() {
  if (!requireAuth()) return;

  let user, langs;
  try {
    [user, langs] = await Promise.all([api.me(), api.getLanguages()]);
  } catch (e) {
    return; // 401 → redirect
  }

  // Apply user's saved theme (override localStorage cache jeśli się rozjechały)
  applyTheme(user.theme || 'dark');

  // Topbar
  document.getElementById('user-name').textContent = user.username;
  const avEl = document.getElementById('user-avatar');
  renderUserAvatar(avEl, user);
  avEl.dataset.userAvatar = '1';
  renderLangSwitcher(langs, user.selected_language);
  document.getElementById('settings-cog').onclick = () => openSettingsModal(user);
  document.getElementById('topbar').style.display = 'flex';

  // Tytuł hero zgodnie z aktywnym językiem
  const current = langs.find(l => l.code === user.selected_language) || langs[0];
  applyLanguageTitle(current);

  // Empty state — gdy aktualny język nie ma contentu, nie męcz API o pokoje
  if (!current.has_content) {
    document.getElementById('d-words').textContent = '0';
    document.getElementById('d-verbs').textContent = '0';
    document.getElementById('d-known').textContent = '0';
    document.getElementById('d-due').textContent = '0';
    renderEmptyLanguageState(current);
    return;
  }

  const [rooms, dash] = await Promise.all([api.getRooms(), api.getDashboard()]);

  document.getElementById('d-words').textContent = dash.total_words;
  document.getElementById('d-verbs').textContent = dash.total_verbs;
  document.getElementById('d-known').textContent = dash.known;
  document.getElementById('d-due').textContent = dash.due_today;

  const grid = document.getElementById('rooms-grid');
  grid.innerHTML = rooms.map(r => {
    const total = r.word_count + r.verb_count;
    const pct = total ? Math.round(r.known_count / total * 100) : 0;
    return `<a href="/static/pages/room.html?id=${r.id}" class="room-card" style="--room-color:${r.color}">
      <img class="room-img" src="${roomImages[r.id]}" alt="${r.name}">
      <span class="room-emoji">${r.emoji}</span>
      <div class="room-name">${r.name}</div>
      <div class="room-desc">${r.description}</div>
      <div class="room-meta">
        <span class="room-badge">${r.word_count} słów</span>
        <span class="room-badge">${r.verb_count} cz.</span>
        ${r.due_today > 0 ? `<span class="room-badge accent">⏰ ${r.due_today} do powtórki</span>` : ''}
        ${r.known_count > 0 ? `<span class="room-badge" style="border-color:${r.color};color:${r.color}">✓ ${r.known_count} znam</span>` : ''}
      </div>
      <div class="room-progress"><div class="room-progress-bar" style="width:${pct}%"></div></div>
    </a>`;
  }).join('');

  if (dash.recent_sentences && dash.recent_sentences.length) {
    document.getElementById('recent-wrap').style.display = '';
    const roomMap = Object.fromEntries(rooms.map(r => [r.id, r.name]));
    document.getElementById('recent-sentences').innerHTML = dash.recent_sentences.map(s =>
      `<div class="sentence-item">
        <div><div class="sentence-hr">${s.text_hr}</div><div class="sentence-pl">${s.text_pl || ''}</div></div>
        <span class="sentence-room">${roomMap[s.room_id] || 'Pokój ' + s.room_id}</span>
      </div>`
    ).join('');
  }
}

init();
</script>
</body>
</html>
