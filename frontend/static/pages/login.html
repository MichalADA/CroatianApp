<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logowanie — Chorwacki od podstaw</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
  .auth-shell { width:100%; max-width:440px; }
  .auth-hero { text-align:center; margin-bottom:1.75rem; }
  .auth-hero .badge { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:.5rem; }
  .auth-hero h1 { font-family:'Syne',sans-serif; font-size:2.4rem; font-weight:800; line-height:1.05; letter-spacing:-0.02em; }
  .auth-hero h1 em { color:var(--accent); font-style:normal; }
  .auth-card {
    background:var(--surface); border:1px solid var(--border2); border-radius:18px;
    padding:2rem 1.75rem; box-shadow:0 12px 48px rgba(0,0,0,0.35);
  }
  .auth-tabs {
    display:grid; grid-template-columns:1fr 1fr; gap:4px;
    background:var(--surface2); border-radius:10px; padding:4px; margin-bottom:1.5rem;
  }
  .auth-tab {
    padding:9px 12px; font-family:'Syne',sans-serif; font-weight:700; font-size:13px;
    background:none; border:none; border-radius:7px; color:var(--text3);
    cursor:pointer; transition:all .15s; letter-spacing:.04em;
  }
  .auth-tab.active { background:var(--surface); color:var(--accent); }
  .auth-tab:hover:not(.active) { color:var(--text2); }
  .auth-form { display:none; flex-direction:column; gap:14px; }
  .auth-form.active { display:flex; }
  .auth-form label { display:block; font-size:11px; color:var(--text3); margin-bottom:5px; text-transform:uppercase; letter-spacing:.06em; }
  .auth-submit {
    margin-top:.5rem; padding:12px 20px; font-family:'Syne',sans-serif; font-weight:700;
    font-size:14px; letter-spacing:.04em;
    background:var(--accent); color:#0f0e0d; border:1px solid var(--accent);
    border-radius:10px; cursor:pointer; transition:background .15s;
  }
  .auth-submit:hover { background:var(--accent2); }
  .auth-submit:disabled { opacity:.6; cursor:not-allowed; }
  .auth-error {
    background:rgba(232,125,125,0.1); border:1px solid var(--red);
    color:var(--red); padding:10px 14px; border-radius:10px; font-size:13px;
    display:none; margin-bottom:1rem;
  }
  .auth-hint {
    margin-top:1rem; text-align:center; font-size:12px; color:var(--text3);
  }
  .auth-hint code {
    background:var(--surface2); padding:2px 8px; border-radius:6px;
    color:var(--accent); font-family:'Inter',monospace; font-size:11.5px;
  }
</style>
</head>
<body>
<div class="auth-shell">
  <div class="auth-hero">
    <div class="badge">🇭🇷 pałac pamięci</div>
    <h1>Chorwacki<br><em>od podstaw</em></h1>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Zaloguj się</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Zarejestruj się</button>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <!-- Login -->
    <form class="auth-form active" id="form-login" onsubmit="event.preventDefault(); doLogin();">
      <div>
        <label>Email lub nazwa użytkownika</label>
        <input type="text" id="login-identifier" autocomplete="username" required>
      </div>
      <div>
        <label>Hasło</label>
        <input type="password" id="login-password" autocomplete="current-password" required>
      </div>
      <button class="auth-submit" type="submit" id="login-btn">Zaloguj się</button>
    </form>

    <!-- Register -->
    <form class="auth-form" id="form-register" onsubmit="event.preventDefault(); doRegister();">
      <div>
        <label>Nazwa użytkownika</label>
        <input type="text" id="reg-username" autocomplete="username" required minlength="3" maxlength="32">
      </div>
      <div>
        <label>Email</label>
        <input type="text" id="reg-email" autocomplete="email" required>
      </div>
      <div>
        <label>Hasło</label>
        <input type="password" id="reg-password" autocomplete="new-password" required minlength="4">
      </div>
      <button class="auth-submit" type="submit" id="reg-btn">Utwórz konto</button>
    </form>

    <div class="auth-hint">
      Konto testowe: <code>test</code> / <code>test</code>
    </div>
  </div>
</div>

<script src="/static/js/ui.js"></script>
<script src="/static/js/api.js"></script>
<script>
  // Już zalogowany? Wracamy na index.
  if (auth.isLoggedIn()) {
    location.href = '/static/index.html';
  }

  function switchTab(name) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.getElementById('form-' + name).classList.add('active');
    hideError();
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError() { document.getElementById('auth-error').style.display = 'none'; }

  async function doLogin() {
    hideError();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    try {
      await api.login({
        identifier: document.getElementById('login-identifier').value.trim(),
        password: document.getElementById('login-password').value,
      });
      location.href = '/static/index.html';
    } catch (e) {
      showError(e.message || 'Nie udało się zalogować');
    } finally {
      btn.disabled = false;
    }
  }

  async function doRegister() {
    hideError();
    const btn = document.getElementById('reg-btn');
    btn.disabled = true;
    try {
      await api.register({
        username: document.getElementById('reg-username').value.trim(),
        email: document.getElementById('reg-email').value.trim(),
        password: document.getElementById('reg-password').value,
      });
      location.href = '/static/index.html';
    } catch (e) {
      showError(e.message || 'Nie udało się utworzyć konta');
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
